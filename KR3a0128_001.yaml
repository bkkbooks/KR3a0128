body:
  text: 顧子義訓或人有玉杯以示顧子顧子曰子之玉杯恐不但以繫酢漿虞世南北堂書鈔卷九十或曰夫人三墳五典八索九邱蓋聖人之陳迹耳子何好焉子曰上紀五帝之盛下述百王之義粲粲如列宿落落如連珠雖復退居窮處簞食瓢飲未始失其樂矣豫可得無好乎虞世南北堂書鈔卷九十五引顧子義訓或問人之寺門有鼓何為顧子曰夏禹縣鼓於門以納諫者此道風也北堂書鈔卷一百二十一不諫則危君諫則危身是以賢人君子上不敢危君下不敢危身三諫不從則去矣徐堅初學記卷十八登高使人意遐臨深使人志清文選張景陽雜詩第九首李善注顧夷子與子華遊於東池子華曰水有四德池為一焉沐浴群生流澤萬世是仁也揚清激濁蕩滌塵穢是義也柔而難犯弱而難勝是勇也導江疏河變盈流謙是智也顧子曰我得汝於池上矣太平御覽卷五十八又卷六十七兩引互校假天下之目以視則四海毫末可見也太平御覽卷三百六十六引顧子義訓昔梁邱據之諫景公也於房晏嬰之諫景公也於朝然晏嬰之忠著於竹帛梁邱之佞于今不絶亦惟公平正直者聖之所先矣太平御覽卷四百五十七夫哀樂喜怒愛憎欲懼人之情也當其哀也則欲哭泣劈踊遇其喜也則欲荒淫流湎遇其樂也則欲歡笑鼓舞荒淫則傷義鼓舞則虧風太平御覽卷四百六十七又卷四百六十八兩引互異參挍訂正子謂子華曰爾有四樂頗知之乎子華曰未之知也子曰二親具存是爾一樂兄弟無故是爾二樂夫和妻柔是爾三樂披褐懷玉是爾四樂子華曰華乃有五遇千載之會而登夫子之堂則華之五樂也太平御覽卷四百六十八人有善於射而高於顧子顧子曰子之射雖百中猶不若我之一彈或曰何以為然顧子曰子之所射老貍之皮耳我之所彈彈狐之心太平御覽卷七百五十五非其道壺漿不可受是其道雖天下不可讓太平御覽卷八百六十一昔宋人臨萬仞之淵釣數寸之鱗魚將食釣不知膝之自進有頃墮而死利能誘也太平御覽卷九百三十五
